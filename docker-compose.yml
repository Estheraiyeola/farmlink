version: '3.9'

services:

  # ── INFRASTRUCTURE ──────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: farmlink-postgres
    environment:
      POSTGRES_DB: farmlink
      POSTGRES_USER: farmlink
      POSTGRES_PASSWORD: farmlink123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmlink"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: farmlink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: farmlink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: farmlink-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: farmlink-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── JAVA SERVICES ───────────────────────────────────────

  gateway:
    build: ./services/gateway
    container_name: farmlink-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  auth-service:
    build: ./services/auth-service
    container_name: farmlink-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmlink
      SPRING_DATASOURCE_USERNAME: farmlink
      SPRING_DATASOURCE_PASSWORD: farmlink123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  order-service:
    build: ./services/order-service
    container_name: farmlink-order
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmlink
      SPRING_DATASOURCE_USERNAME: farmlink
      SPRING_DATASOURCE_PASSWORD: farmlink123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  escrow-service:
    build: ./services/escrow-service
    container_name: farmlink-escrow
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmlink
      SPRING_DATASOURCE_USERNAME: farmlink
      SPRING_DATASOURCE_PASSWORD: farmlink123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── PYTHON SERVICES ─────────────────────────────────────

  price-service:
    build: ./services/price-service
    container_name: farmlink-price
    ports:
      - "8084:8084"
    environment:
      MONGO_URL: mongodb://mongo:27017/farmlink
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  forecast-service:
    build: ./services/forecast-service
    container_name: farmlink-forecast
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: postgresql://farmlink:farmlink123@postgres:5432/farmlink
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: ./services/notification-service
    container_name: farmlink-notification
    ports:
      - "8086:8086"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TERMII_API_KEY: your_termii_key_here
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  mongo_data:
