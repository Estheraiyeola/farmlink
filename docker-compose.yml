services:

  # ── INFRASTRUCTURE ──────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: farmlink-postgres
    environment:
      POSTGRES_DB: farmlink
      POSTGRES_USER: farmlink
      POSTGRES_PASSWORD: farmlink123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmlink"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: farmlink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: farmlink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: farmlink-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:latest
    container_name: farmlink-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── JAVA SERVICES ───────────────────────────────────────

  gateway:
    build: ./services/gateway
    container_name: farmlink-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  auth-service:
    build: ./services/auth-service
    container_name: farmlink-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmlink
      SPRING_DATASOURCE_USERNAME: farmlink
      SPRING_DATASOURCE_PASSWORD: farmlink123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  order-service:
    build: ./services/order-service
    container_name: farmlink-order
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmlink
      SPRING_DATASOURCE_USERNAME: farmlink
      SPRING_DATASOURCE_PASSWORD: farmlink123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8082
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  escrow-service:
    build: ./services/escrow-service
    container_name: farmlink-escrow
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/farmlink
      SPRING_DATASOURCE_USERNAME: farmlink
      SPRING_DATASOURCE_PASSWORD: farmlink123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── PYTHON SERVICES ─────────────────────────────────────

  price-service:
    build: ./services/price-service
    container_name: farmlink-price
    ports:
      - "8084:8084"
    environment:
      MONGO_URL: mongodb://mongo:27017/farmlink
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  forecast-service:
    build: ./services/forecast-service
    container_name: farmlink-forecast
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: postgresql://farmlink:farmlink123@postgres:5432/farmlink
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: ./services/notification-service
    container_name: farmlink-notification
    ports:
      - "8086:8086"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TERMII_API_KEY: your_termii_key_here
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  mongo_data:
